<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد البشمهندس فيصل 🎂</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

/* 🎬 intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    animation: fadeOut 2s forwards 2s;
}

@keyframes fadeOut {
    to {opacity: 0; visibility: hidden;}
}

/* 🎂 main */
#main {
    opacity: 0;
    animation: show 2s forwards 3s;
}

@keyframes show {
    to {opacity: 1;}
}

/* 🎂 العنوان */
.title {
    margin-top: 50px;
    font-size: 1.6em;
    white-space: nowrap;
}

/* ✨ الاسم */
.name {
    font-size: 2.5em;
    color: #22c55e;
    text-shadow: 0 0 20px #22c55e, 0 0 40px #22c55e;
}

/* 👇 الإهداء */
.from {
    margin-top: 10px;
    font-size: 1.4em;
    color: #94a3b8;
}

/* 🎊 confetti */
.confetti {
    position: fixed;
    width: 6px;
    height: 12px;
    top: -10px;
    opacity: 0.9;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* 🎈 balloons */
.balloon {
    position: fixed;
    bottom: -100px;
    width: 50px;
    height: 70px;
    border-radius: 50%;
    animation: float 12s linear infinite;
}

@keyframes float {
    to {transform: translateY(-130vh);}
}

/* 🎂 cake */
.cake {
    margin-top: 30px;
}

/* 🕯️ candles */
.candle {
    width: 10px;
    height: 40px;
    background: white;
    margin: 3px;
    display: inline-block;
    position: relative;
}

.flame {
    width: 10px;
    height: 15px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -15px;
    animation: flicker 0.2s infinite;
}

@keyframes flicker {
    50% {opacity: 0.5;}
}

/* 💨 smoke */
.smoke {
    width: 10px;
    height: 10px;
    background: gray;
    border-radius: 50%;
    position: absolute;
    top: -20px;
    animation: smoke 2s forwards;
}

@keyframes smoke {
    to {
        opacity: 0;
        transform: translateY(-40px);
    }
}

/* 🙏 الدعاء */
.dua {
    margin-top: 30px;
    font-size: 2em;
    line-height: 1.8;
    color: #e2e8f0;
    text-align: center;
}

/* ✍️ توقيع */
.signature {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 0.9em;
    color: #64748b;
    opacity: 0.7;
}
</style>
</head>

<body>

<div id="intro">
    🎁  مفاجأة 
</div>

<div id="main">
    <h1 class="title">🎂 Happy Birthday to you 🎂</h1>

    <div class="name" id="name"></div>
    <p class="from">تهنئة من أنس محمد الدحدوح 💙</p>

    <div class="cake" id="candles"></div>

    <p class="dua">
        🎉 عيد ميلاد سعيد يا بطل<br>
        ربي يجعلك قرة عين لأهلك<br>
        ويحفظك لنا وتكبر<br>
        ونشوفك في أعلى المراتب<br>
        وعقبال 100 سنة يا رب 💙
    </p>
</div>

<div class="signature">Anas</div>

<script>

// ✨ الاسم
function typeName(text){
    let el = document.getElementById("name");
    let i=0;
    let interval=setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    },120);
}

// 🎊 confetti (انفجار)
function confettiBurst(){
    for(let i=0;i<150;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["#ff4d4d","#ffd93d","#4dff88","#4da6ff"][Math.floor(Math.random()*4)];
        c.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),3000);
    }
}

// 🎈 balloons
function balloons(){
    for(let i=0;i<12;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=["red","yellow","green","blue","pink"][Math.floor(Math.random()*5)];
        b.style.animationDuration=(8+Math.random()*5)+"s";
        document.body.appendChild(b);
    }
}

// 🕯️ candles
function candles(){
    let container = document.getElementById("candles");
    container.innerHTML = "";

    for(let i=0;i<9;i++){
        let c = document.createElement("div");
        c.className = "candle";

        let f = document.createElement("div");
        f.className = "flame";

        c.appendChild(f);
        container.appendChild(c);
    }

    setTimeout(blow,5000);
}

// 💨 إطفاء
function blow(){
    document.querySelectorAll(".flame").forEach(f=>{
        f.remove();

        let s=document.createElement("div");
        s.className="smoke";
        f.parentElement.appendChild(s);
    });
}

// 🚀 start
setTimeout(()=>{
    typeName("فيصل محمود الدحدوح");
    confettiBurst();
    balloons();
    candles();
},3000);

// 💥 عند الضغط
document.body.addEventListener("click", confettiBurst);

</script>

</body>
</html>
