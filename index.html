<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سعيد 🎂</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    overflow: hidden;
}

.screen {
    display: none;
    padding: 40px 20px;
}

.active {
    display: block;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    cursor: pointer;
    margin-top: 20px;
}

button:hover {
    background: #16a34a;
}

/* 🎂 عنوان */
.title {
    font-size: 2.5em;
    margin-top: 40px;
}

/* ✨ Glow */
.glow {
    font-size: 2.2em;
    color: #fff;
    text-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e, 0 0 40px #22c55e;
}

/* 🎈 بالونات */
.balloon {
    position: fixed;
    bottom: -100px;
    width: 40px;
    height: 60px;
    background: red;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    to {
        transform: translateY(-120vh);
    }
}

/* 🎊 confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: 0;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<!-- 🎬 البداية -->
<div id="start" class="screen active">
    <h1 class="title">🎂 اليوم يومك يا بطل</h1>
    <p>في مفاجأة خاصة إلك 👇</p>
    <button onclick="next('message')">ابدأ 🎁</button>
</div>

<!-- 💬 رسالة -->
<div id="message" class="screen">
    <h1>أنا فخور فيك 💙</h1>
    <p>حتى وإنت بعيد… أنت بطل!</p>
    <button onclick="next('final')">كمل 👇</button>
</div>

<!-- 🎉 النهاية -->
<div id="final" class="screen">
    <h1>🎂 Happy Birthday 🎂</h1>
    <h2 id="name" class="glow"></h2>
    <p>أنت شخص مميز جدًا 💙</p>
</div>

<script>
function next(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if(id === "final"){
        startCelebration();
    }
}

// ✨ كتابة الاسم تدريجيًا
function typeName(text) {
    let i = 0;
    let el = document.getElementById("name");
    el.innerHTML = "";

    let interval = setInterval(() => {
        el.innerHTML += text[i];
        i++;
        if(i >= text.length) clearInterval(interval);
    }, 150);
}

// 🎊 confetti
function confetti() {
    for (let i = 0; i < 80; i++) {
        let div = document.createElement("div");
        div.className = "confetti";
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = ["red","yellow","blue","green","pink"][Math.floor(Math.random()*5)];
        div.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(div);

        setTimeout(() => div.remove(), 4000);
    }
}

// 🎈 بالونات
function balloons() {
    for (let i = 0; i < 10; i++) {
        let b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * 100 + "vw";
        b.style.background = ["red","blue","yellow","green","pink"][Math.floor(Math.random()*5)];
        b.style.animationDuration = (4 + Math.random() * 4) + "s";
        document.body.appendChild(b);

        setTimeout(() => b.remove(), 6000);
    }
}

// 🚀 تشغيل الاحتفال
function startCelebration(){
    typeName("فيصل"); // 👈 غير الاسم هنا
    confetti();
    balloons();
}
</script>

</body>
</html>
