<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد 🎂</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

/* 🎬 شاشة البداية */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    animation: fadeOut 2s forwards 2s;
}

@keyframes fadeOut {
    to {opacity: 0; visibility: hidden;}
}

/* 🎂 المحتوى */
#main {
    opacity: 0;
    animation: show 2s forwards 3s;
}

@keyframes show {
    to {opacity: 1;}
}

h1 {
    margin-top: 50px;
    font-size: 2.5em;
}

/* ✨ glow */
.name {
    font-size: 2.5em;
    color: #22c55e;
    text-shadow: 0 0 20px #22c55e, 0 0 40px #22c55e;
}

/* 🎊 confetti واقعي */
.confetti {
    position: fixed;
    width: 6px;
    height: 12px;
    top: -10px;
    opacity: 0.8;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* 🎈 بالونات */
.balloon {
    position: fixed;
    bottom: -100px;
    width: 50px;
    height: 70px;
    border-radius: 50%;
    animation: float 12s linear infinite;
}

@keyframes float {
    to {transform: translateY(-130vh);}
}

/* 🎂 كيك */
.cake {
    margin-top: 30px;
}

/* 🕯️ الشمع */
.candle {
    width: 10px;
    height: 40px;
    background: white;
    margin: 3px;
    display: inline-block;
    position: relative;
}

.flame {
    width: 10px;
    height: 15px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -15px;
    animation: flicker 0.2s infinite;
}

@keyframes flicker {
    50% {opacity: 0.5;}
}

/* 💨 دخان */
.smoke {
    width: 10px;
    height: 10px;
    background: gray;
    border-radius: 50%;
    position: absolute;
    top: -20px;
    animation: smoke 2s forwards;
}

@keyframes smoke {
    to {
        opacity: 0;
        transform: translateY(-40px);
    }
}
</style>
</head>

<body>

<!-- 🎬 intro -->
<div id="intro">
    🎁 في مفاجأة...
</div>

<!-- 🎂 main -->
<div id="main">
    <h1>🎂 Happy Birthday 🎂</h1>
    <div class="name" id="name"></div>

    <div class="cake" id="candles"></div>
</div>

<script>

// ✨ كتابة الاسم
function typeName(text){
    let el = document.getElementById("name");
    let i=0;
    let interval=setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    },120);
}

// 🎊 confetti محترم
function confetti(){
    for(let i=0;i<120;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["#ff4d4d","#ffd93d","#4dff88","#4da6ff"][Math.floor(Math.random()*4)];
        c.style.animationDuration=(3+Math.random()*3)+"s";
        document.body.appendChild(c);
    }
}

// 🎈 بالونات ناعمة
function balloons(){
    for(let i=0;i<12;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=["red","yellow","green","blue","pink"][Math.floor(Math.random()*5)];
        b.style.animationDuration=(8+Math.random()*5)+"s";
        document.body.appendChild(b);
    }
}

// 🕯️ شمع
function candles(){
    let container=document.getElementById("candles");

    for(let i=0;i<9;i++){
        let c=document.createElement("div");
        c.className="candle";

        let f=document.createElement("div");
        f.className="flame";

        c.appendChild(f);
        container.appendChild(c);
    }

    setTimeout(blow,5000);
}

// 💨 إطفاء
function blow(){
    document.querySelectorAll(".flame").forEach(f=>{
        f.remove();

        let s=document.createElement("div");
        s.className="smoke";
        f.parentElement.appendChild(s);
    });
}

// 🚀 تشغيل
setTimeout(()=>{
    typeName("فيصل"); // 👈 غير الاسم
    confetti();
    balloons();
    candles();
},3000);

</script>

</body>
</html>
