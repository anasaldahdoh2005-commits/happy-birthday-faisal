<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد البشمهندس فيصل  🎂</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

/* زر البداية */
#startBtn {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    cursor: pointer;
}

/* الصفحة */
#main {
    display: none;
}

/* العنوان */
.title {
    margin-top: 50px;
    font-size: 1.6em;
}

/* الاسم */
.name {
    font-size: 2.5em;
    color: #22c55e;
    text-shadow: 0 0 20px #22c55e;
}

/* الإهداء */
.from {
    font-size: 1.4em;
    color: #94a3b8;
}

/* دعاء */
.dua {
    margin-top: 30px;
    font-size: 2em;
    line-height: 1.8;
}

/* توقيع */
.signature {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 0.9em;
    color: #64748b;
}

/* confetti */
.confetti {
    position: fixed;
    width: 6px;
    height: 12px;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<!-- زر البداية -->
<div id="startBtn">🎉 اضغط لبدء الاحتفال</div>

<!-- الصفحة -->
<div id="main">
    <h1 class="title">🎂 Happy Birthday 🎂</h1>
    <div class="name" id="name"></div>
    <p class="from">تهنئة من أنس محمد الدحدوح 💙</p>

    <p class="dua">
        🎉 عيد ميلاد سعيد يا بطل<br>
        ربي يجعلك قرة عين لأهلك<br>
        ويحفظك لنا وتكبر<br>
        ونشوفك في أعلى المراتب<br>
        💙 وعقبال 100 سنة يا رب
    </p>
</div>

<!-- الصوت -->
<audio id="music" src="music.mp3.mpeg" preload="auto" loop></audio>

<div class="signature">Anas</div>

<script>

// كتابة الاسم
function typeName(text){
    let el = document.getElementById("name");
    let i=0;
    let interval=setInterval(()=>{
        el.innerHTML += text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    },100);
}

// confetti
function confetti(){
    for(let i=0;i<100;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","yellow","green","blue"][Math.floor(Math.random()*4)];
        c.style.animationDuration=(3+Math.random()*3)+"s";
        document.body.appendChild(c);
    }
}

// عند الضغط
document.getElementById("startBtn").onclick = function(){
    this.style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("music").play();

    typeName("فيصل محمود الدحدوح");
    confetti();
};

</script>

</body>
</html>
