<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد 🎂</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    overflow: hidden;
}

.screen {
    display: none;
    padding: 40px 20px;
}

.active {
    display: block;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    border: none;
}

/* 🎂 Glow الاسم */
.glow {
    font-size: 2em;
    text-shadow: 0 0 10px #22c55e, 0 0 30px #22c55e;
}

/* 🎈 بالونات أطول */
.balloon {
    position: fixed;
    bottom: -100px;
    width: 40px;
    height: 60px;
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    to {
        transform: translateY(-130vh);
    }
}

/* 🎊 Confetti أطول */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    animation: fall 6s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}

/* 🕯️ الشمع */
.candle {
    width: 10px;
    height: 40px;
    background: white;
    margin: 5px;
    display: inline-block;
    position: relative;
}

.flame {
    width: 10px;
    height: 15px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -15px;
    animation: flicker 0.2s infinite;
}

@keyframes flicker {
    0% {opacity: 1;}
    50% {opacity: 0.6;}
    100% {opacity: 1;}
}

/* 💨 دخان */
.smoke {
    width: 10px;
    height: 10px;
    background: gray;
    border-radius: 50%;
    position: absolute;
    top: -20px;
    opacity: 0;
    animation: smoke 2s forwards;
}

@keyframes smoke {
    0% {opacity: 0.8; transform: translateY(0);}
    100% {opacity: 0; transform: translateY(-40px);}
}
</style>
</head>

<body>

<!-- البداية -->
<div id="start" class="screen active">
    <h1>🎂 اليوم يومك</h1>
    <button onclick="next()">ابدأ 🎁</button>
</div>

<!-- النهاية -->
<div id="final" class="screen">
    <h1>🎂 Happy Birthday 🎂</h1>
    <h2 id="name" class="glow"></h2>

    <!-- 🕯️ الشمع -->
    <div id="candles"></div>
</div>

<script>
function next(){
    document.getElementById("start").classList.remove("active");
    document.getElementById("final").classList.add("active");

    startCelebration();
}

// ✨ كتابة الاسم
function typeName(name){
    let el = document.getElementById("name");
    let i = 0;
    let interval = setInterval(()=>{
        el.innerHTML += name[i];
        i++;
        if(i >= name.length) clearInterval(interval);
    },150);
}

// 🎈 بالونات
function balloons(){
    for(let i=0;i<20;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=["red","blue","green","yellow","pink"][Math.floor(Math.random()*5)];
        document.body.appendChild(b);
    }
}

// 🎊 confetti
function confetti(){
    for(let i=0;i<150;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","blue","green","yellow","pink"][Math.floor(Math.random()*5)];
        document.body.appendChild(c);
    }
}

// 🕯️ إنشاء الشمع
function createCandles(){
    let container = document.getElementById("candles");

    for(let i=0;i<9;i++){ // 👈 عدد الشمع
        let candle = document.createElement("div");
        candle.className="candle";

        let flame = document.createElement("div");
        flame.className="flame";

        candle.appendChild(flame);
        container.appendChild(candle);
    }

    // 🔥 بعد 5 ثواني تنطفي
    setTimeout(blowCandles, 5000);
}

// 💨 إطفاء الشمع
function blowCandles(){
    document.querySelectorAll(".flame").forEach(f=>{
        f.remove();

        let smoke = document.createElement("div");
        smoke.className="smoke";
        f.parentElement.appendChild(smoke);
    });
}

// 🚀 تشغيل كل شيء
function startCelebration(){
    typeName("فيصل"); // 👈 غير الاسم
    balloons();
    confetti();
    createCandles();
}
</script>

</body>
</html>
